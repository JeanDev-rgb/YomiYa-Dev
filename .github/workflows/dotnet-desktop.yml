name: YomiYa CI/CD - Build & Package Net10

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Name: YomiYa.sln
      Main_Project: YomiYa/YomiYa.csproj
      # Carpeta donde se armará el paquete final
      Publish_Dir: ./Publish/YomiYa-Release

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. INYECTAR CREDENCIALES (EmbeddedResource)
    # Crea el archivo físico necesario para que la compilación no falle
    - name: Create credentials.json
      shell: pwsh
      run: |
        $secretsJson = @"
        ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        "@
        $secretsJson | Out-File -FilePath YomiYa/credentials.json -Encoding utf8

    # 2. CONFIGURAR .NET 10
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true # Necesario mientras .NET 10 sea preview

    # 3. RESTAURAR Y CONSTRUIR SOLUCIÓN
    - name: Restore dependencies
      run: dotnet restore ${{ env.Solution_Name }}

    - name: Build Solution
      run: dotnet build ${{ env.Solution_Name }} --configuration Release --no-restore

    # 4. PUBLICAR APP PRINCIPAL (YomiYa)
    # Usamos SingleFile y SelfContained para que sea un solo ejecutable portable
    - name: Publish YomiYa
      run: |
        dotnet publish ${{ env.Main_Project }} `
          --configuration Release `
          --output ${{ env.Publish_Dir }} `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true

    # 5. PUBLICAR PLUGINS (Directo a la subcarpeta del Release)
    # Publicamos cada plugin en la carpeta 'Plugins' dentro de la salida de la App
    - name: Publish Plugin Akaya
      run: |
        dotnet publish Plugins/Akaya/Akaya.csproj `
          --configuration Release `
          --output ${{ env.Publish_Dir }}/Plugins `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true

    - name: Publish Plugin NovelCool
      run: |
        dotnet publish Plugins/NovelCool/NovelCool.csproj `
          --configuration Release `
          --output ${{ env.Publish_Dir }}/Plugins `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true

    # 6. EMPAQUETADO (ZIP)
    - name: Zip Release
      shell: powershell
      run: |
        Compress-Archive -Path ${{ env.Publish_Dir }}/* -DestinationPath ./YomiYa-v${{ github.run_number }}-win-x64.zip

    # 7. SUBIR ARTEFACTO FINAL
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YomiYa-Windows-x64
        path: ./*.zip
